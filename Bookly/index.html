<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/static/homes.css">

<!-- PWA manifest -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#007bff">

<title>Bookly</title>
</head>

<body>

<div id="Header">
    <input type="text" placeholder="Enter the book name" id="Search">
    <button onclick="searchBook()" id="search_btn">Search</button>
    <h1 id="Bookly">Bookly</h1>
</div>

<div id="results"></div>

<script>
// Book search function
async function searchBook() {
    const query = document.getElementById("Search").value
    const results = document.getElementById("results")
    results.innerHTML = ""

    try {
        const [guttenRes, openRes] = await Promise.all([
            fetch(`https://gutendex.com/books/?search=${query}`),
            fetch(`https://openlibrary.org/search.json?q=${query}`)
        ])

        const gutData = await guttenRes.json()
        const openData = await openRes.json()

        gutData.results.slice(0, 10).forEach(book => {
            const title = book.title
            const author = book.authors.length ? book.authors[0].name : "Unknown"
            const cover = book.formats["image/jpeg"] || ""
            const link = book.formats["text/html"] || book.formats["application/epub+zip"] || "#"

            const box = document.createElement("div")
            box.className = "Content"
            box.innerHTML = `
                <h2>${title}</h2>
                <p>${author}</p>
                <img src="${cover}" width="120">
                <br>
                <button onclick="window.open('${link}')">
                    Read Book
                </button>
            `
            results.appendChild(box)
        })

        openData.docs.slice(0, 10).forEach(book => {
            const title = book.title
            const author = book.author_name ? book.author_name[0] : "Unknown"
            const cover = book.cover_i 
                ? `https://covers.openlibrary.org/b/id/${book.cover_i}-M.jpg`
                : ""
            const link = `https://openlibrary.org${book.key}`

            const box = document.createElement("div")
            box.className = "Content"
            box.innerHTML = `
                <h2>${title}</h2>
                <p>${author}</p>
                <img src="${cover}" width="120">
                <br>
                <button onclick="window.open('${link}')">
                    View Book
                </button>
            `
            results.appendChild(box)
        })
    } catch (err) {
        console.error("Error fetching books:", err)
    }
}

// Register service worker
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
        .then(reg => console.log('Service Worker registered:', reg.scope))
        .catch(err => console.error('Service Worker registration failed:', err))
    })
}
</script>

</body>
</html>
